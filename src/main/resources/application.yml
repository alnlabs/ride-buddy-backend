server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ride-buddy-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:ridebuddy}
    username: ${DB_USER:ridebuddy}
    password: ${DB_PASSWORD:ridebuddy}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  auth:
    mock-otp: ${APP_AUTH_MOCK_OTP:true}
    mock-otp-code: "123456"
    jwt-secret: ${JWT_SECRET:ride-buddy-dev-secret-key-must-be-at-least-32-chars-long}
    access-token-minutes: 60
    refresh-token-days: 30
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:*}
  share:
    ride-base-url: ${APP_SHARE_RIDE_BASE_URL:https://ridebuddy.alnlabs.com/r}
    need-base-url: ${APP_SHARE_NEED_BASE_URL:https://ridebuddy.alnlabs.com/n}
    app-store-url: ${APP_SHARE_APP_STORE_URL:https://ridebuddy.alnlabs.com}
    play-store-url: ${APP_SHARE_PLAY_STORE_URL:https://ridebuddy.alnlabs.com}

logging:
  level:
    com.alnlabs.ridebuddy: INFO
