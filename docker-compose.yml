services:
  postgres:
    image: postgis/postgis:16-3.4
    platform: linux/amd64
    container_name: ride-buddy-postgres
    environment:
      POSTGRES_DB: ridebuddy
      POSTGRES_USER: ridebuddy
      POSTGRES_PASSWORD: ridebuddy
    ports:
      - "5433:5432"
    volumes:
      - ride_buddy_pgdata:/var/lib/postgresql/data
      - ./sql:/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ridebuddy -d ridebuddy"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  ride_buddy_pgdata:
